<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Auto-bounce back to Studio in 2s. Visible cue + manual button
       below for users who want a beat to read the explanation. -->
  <meta http-equiv="refresh" content="2;url=/">
  <title>Settings — admin only</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --emerald: #0E5C4A;
      --emerald-dark: #094335;
      --bg: #F8F6EF;
      --surface: #FFFFFF;
      --text: #111827;
      --muted: #6B7280;
      --shadow: 0 1px 2px rgba(20, 30, 25, 0.04), 0 4px 14px rgba(20, 30, 25, 0.04);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      padding: 24px;
    }
    .card {
      background: var(--surface);
      border-radius: 14px;
      padding: 44px 40px 36px;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .lock {
      width: 36px;
      height: 36px;
      margin: 0 auto 18px;
      display: block;
      color: var(--emerald);
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 14px;
      color: var(--muted);
      margin: 0 0 24px;
      line-height: 1.5;
    }
    a.btn {
      display: inline-block;
      padding: 9px 22px;
      background: var(--emerald);
      color: #fff;
      border-radius: 999px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s;
    }
    a.btn:hover { background: var(--emerald-dark); }
  </style>
</head>
<body>
  <div class="card">
    <svg class="lock" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="4" y="11" width="16" height="10" rx="2"/>
      <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
    </svg>
    <h1>Settings is admin-only</h1>
    <p>Returning you to Studio in a moment.</p>
    <a class="btn" href="/">Back to Studio</a>
  </div>
</body>
</html>
