# fly.toml app configuration file generated for g-ads-agent on 2026-05-13T20:44:29+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'g-ads-agent'
primary_region = 'fra'

[build]

[env]
  SAA_LOG_JSON = '1'
  SAA_LOG_LEVEL = 'INFO'

[[mounts]]
  source = 'saa_data'
  destination = '/app/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # TEMP: keep 1 machine warm during auth-gate testing so SSH / debug
  # works without the wake-on-HTTP dance. Revert to 0 once verified to
  # save free-tier hours (~$0/mo vs ~$2/mo if always-on). 2026-05-13.
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/config/status'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
